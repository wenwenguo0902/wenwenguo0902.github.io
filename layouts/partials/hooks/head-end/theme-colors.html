<style>
  :root{
  --brand:#9CA3AF;       /* neutral gray for accents */
  --brand-weak:#F4F4F5;  /* soft gray for hovers */
  --surface:#FFFFFF;     /* page background: white */
  --surface-alt:#F4F4F5; /* cards / blocks: light gray */
  --border:#E5E7EB;      /* light gray border */
  --text:#111827;        /* readable near-black */
  --muted:#6B7280;       /* neutral gray for meta text */
  --accent-strength: 0.04;
}

  /* hover color */
  .nav-link:hover {
    color: var(--brand);
  }

  :is(.dark .nav-link:hover) {
    color: var(--brand);
  }

  .hover\:text-primary-700:hover {
    color: var(--brand);
  }

  #site-header.header {
    background-color: var(--surface);
  }

  /* Base surfaces + ultra-subtle top glow */
  html, body{ background: var(--surface); color: var(--text); }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:-1;
    background: radial-gradient(1200px 420px at 50% -220px,
      color-mix(in srgb, var(--brand) calc(var(--accent-strength)*100%), transparent), transparent 70%);
    opacity:.55;
  }

  /* Cards (apply class="section-card" to your section wrappers) */
  .section-card{
    background: var(--surface-alt);
    border:1px solid var(--border);
    border-radius:1rem;
    box-shadow:0 8px 24px rgba(17,24,39,.05);
    padding:1.5rem;
  }
  @media (min-width:1024px){ .section-card{ padding:2rem; } }
  .dark .section-card{ box-shadow:0 12px 32px rgba(0,0,0,.35); }

  /* Section title accent line (class="section-title" on your H3) */
  .section-title{ position:relative; }
  .section-title::after{
    content:""; display:block; height:3px; margin-top:.5rem;
    background: linear-gradient(90deg, var(--brand), transparent);
    width:50%;
  }

  /* Integrations with your existing interactions */
  .prose a{ color: inherit; }
  .prose a:hover{ color: var(--brand); }
  .gradient-underline,
  .prose a{ background-image: linear-gradient(var(--brand), var(--brand)); } /* soft beige underline */
  .border-s{ border-color: var(--border) !important; }
  .tl-dot::after{ box-shadow: 0 0 0 0 color-mix(in srgb, var(--brand) 30%, transparent); }

  /* Buttons (works with the .btn-cta class you added) */
  .btn-cta{ background-image: linear-gradient(180deg,#fff,#f9fafb); border:1px solid var(--border); }
  .btn-cta:hover{
    border-color: color-mix(in srgb, var(--brand) 55%, var(--border));
    box-shadow:0 6px 16px rgba(209,169,140,.18);
  }
  .btn-cta:focus-visible{
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 60%, transparent);
  }
  
     /* ===== Homepage About entrance animation ===== */
    
    /* 左侧头像以下：姓名、中文名、身份、学校、社交图标 */
    .home-section:first-of-type #profile .portrait-title,
    .home-section:first-of-type #profile .network-icon {
      opacity: 0;
      animation: aboutSlideLeft 0.8s cubic-bezier(.22,.61,.36,1) forwards;
    }
    
    .home-section:first-of-type #profile .portrait-title {
      animation-delay: 0.12s;
    }
    
    .home-section:first-of-type #profile .network-icon {
      animation-delay: 0.28s;
    }
    
    /* About Me 标题、正文、Download CV：从上往下 */
    .home-section:first-of-type h1,
    .home-section:first-of-type .article-style,
    .home-section:first-of-type .prose,
    .home-section:first-of-type .btn,
    .home-section:first-of-type .btn-links {
      opacity: 0;
      animation: aboutSlideTop 0.8s cubic-bezier(.22,.61,.36,1) forwards;
    }
    
    .home-section:first-of-type h1 {
      animation-delay: 0.10s;
    }
    
    .home-section:first-of-type .article-style,
    .home-section:first-of-type .prose {
      animation-delay: 0.22s;
    }
    
    .home-section:first-of-type .btn,
    .home-section:first-of-type .btn-links {
      animation-delay: 0.34s;
    }
    
    /* Interests：从下往上 */
    .home-section:first-of-type .ul-interests,
    .home-section:first-of-type .ul-interests li {
      opacity: 0;
      animation: aboutSlideBottom 0.8s cubic-bezier(.22,.61,.36,1) forwards;
    }
    
    .home-section:first-of-type .ul-interests {
      animation-delay: 0.38s;
    }
    
    .home-section:first-of-type .ul-interests li:nth-child(1) { animation-delay: 0.42s; }
    .home-section:first-of-type .ul-interests li:nth-child(2) { animation-delay: 0.48s; }
    .home-section:first-of-type .ul-interests li:nth-child(3) { animation-delay: 0.54s; }
    .home-section:first-of-type .ul-interests li:nth-child(4) { animation-delay: 0.60s; }
    .home-section:first-of-type .ul-interests li:nth-child(5) { animation-delay: 0.66s; }
    
    /* Education：从右往左 */
    .home-section:first-of-type .ul-edu,
    .home-section:first-of-type .ul-edu li {
      opacity: 0;
      animation: aboutSlideRight 0.8s cubic-bezier(.22,.61,.36,1) forwards;
    }
    
    .home-section:first-of-type .ul-edu {
      animation-delay: 0.42s;
    }
    
    .home-section:first-of-type .ul-edu li:nth-child(1) { animation-delay: 0.46s; }
    .home-section:first-of-type .ul-edu li:nth-child(2) { animation-delay: 0.52s; }
    .home-section:first-of-type .ul-edu li:nth-child(3) { animation-delay: 0.58s; }
    .home-section:first-of-type .ul-edu li:nth-child(4) { animation-delay: 0.64s; }
    
    /* 动效方向 */
    @keyframes aboutSlideLeft {
      from {
        opacity: 0;
        transform: translateX(-32px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    @keyframes aboutSlideRight {
      from {
        opacity: 0;
        transform: translateX(32px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    @keyframes aboutSlideTop {
      from {
        opacity: 0;
        transform: translateY(-28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes aboutSlideBottom {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* 手机端位移减小 */
    @media (max-width: 768px) {
      @keyframes aboutSlideLeft {
        from {
          opacity: 0;
          transform: translateX(-18px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
    
      @keyframes aboutSlideRight {
        from {
          opacity: 0;
          transform: translateX(18px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
    
      @keyframes aboutSlideTop {
        from {
          opacity: 0;
          transform: translateY(-18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    
      @keyframes aboutSlideBottom {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    }
    /* ===== Scroll reveal for Markdown homepage sections ===== */
  
  .markdown-section-reveal {
    opacity: 0;
    transform: translateY(36px);
    transition:
      opacity 0.85s cubic-bezier(.22,.61,.36,1),
      transform 0.85s cubic-bezier(.22,.61,.36,1);
    will-change: opacity, transform;
  }
  
  .markdown-section-reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }
  
  /* 每个 section 之间留一点空间 */
  .markdown-section-reveal + .markdown-section-reveal {
    margin-top: 2.2rem;
  }
  
  /* 标题更干净一点 */
  .markdown-section-reveal h2 {
    margin-top: 0;
  }
  
  /* 减少动画设置 */
  @media (prefers-reduced-motion: reduce) {
    .markdown-section-reveal {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
    }
  }
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const containers = document.querySelectorAll(".article-style, .prose, .markdown, article");

  containers.forEach(function (container) {
    const headings = Array.from(container.querySelectorAll("h2"));

    headings.forEach(function (heading) {
      if (heading.closest(".markdown-section-reveal")) return;

      const wrapper = document.createElement("section");
      wrapper.className = "markdown-section-reveal";

      heading.parentNode.insertBefore(wrapper, heading);
      wrapper.appendChild(heading);

      let next = wrapper.nextSibling;

      while (next) {
        const current = next;
        next = next.nextSibling;

        if (current.nodeType === 1 && current.tagName === "H2") {
          wrapper.parentNode.insertBefore(current, wrapper.nextSibling);
          break;
        }

        wrapper.appendChild(current);
      }
    });
  });

  const revealItems = document.querySelectorAll(".markdown-section-reveal");

  const observer = new IntersectionObserver(
    function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
          observer.unobserve(entry.target);
        }
      });
    },
    {
      threshold: 0.15,
      rootMargin: "0px 0px -80px 0px"
    }
  );

  revealItems.forEach(function (item, index) {
    item.style.transitionDelay = Math.min(index * 0.06, 0.3) + "s";
    observer.observe(item);
  });
});
</script>
