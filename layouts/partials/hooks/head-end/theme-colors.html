<style>
  /* =========================================================
     Wenwen Guo personal website
     White background + black text + plain right navigation
     ========================================================= */

  :root {
    --surface: #ffffff;
    --surface-alt: #f4f4f5;
    --border: #e5e7eb;
    --text: #000000;
    --muted: #6b7280;
    --hover: #6b7280;
    --max-width: 1080px;
  }

  html {
    scroll-behavior: smooth;
    background: #ffffff !important;
  }

  body {
    background: #ffffff !important;
    color: #000000 !important;
  }

  body::before {
    display: none !important;
  }

  /* =========================================================
     Header
     ========================================================= */

  #site-header.header,
  .navbar,
  .navbar-light,
  header {
    background: #ffffff !important;
    border-bottom: 1px solid var(--border) !important;
    box-shadow: none !important;
  }

  .navbar-brand,
  .navbar .navbar-brand,
  header a[href="/"],
  header a[href="./"] {
    color: #000000 !important;
    font-weight: 800 !important;
    text-decoration: none !important;
  }

  .navbar-nav,
  .navbar .navbar-nav,
  #navbar-main .navbar-nav,
  header .nav-item,
  header .menu,
  header nav ul {
    display: none !important;
  }

  /* =========================================================
     Page width
     ========================================================= */

  main,
  .page-wrapper,
  .universal-wrapper,
  .article-container,
  .docs-article-container,
  .container,
  .max-w-screen-xl,
  .max-w-7xl,
  .mx-auto {
    max-width: var(--max-width) !important;
  }

  .home-section,
  section {
    background: #ffffff !important;
  }

  /* =========================================================
     Typography
     ========================================================= */

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    color: #000000 !important;
    letter-spacing: -0.02em;
  }

  h2 {
    border-bottom: 1px solid var(--border) !important;
    padding-bottom: 0.45rem !important;
    margin-top: 2.4rem !important;
    margin-bottom: 1.15rem !important;
  }

  p,
  li,
  span,
  div {
    color: inherit;
  }

  .article-style p,
  .prose p,
  .markdown p {
    line-height: 1.75 !important;
  }

  .article-style li,
  .prose li,
  .markdown li {
    margin-bottom: 0.55rem !important;
  }

  /* =========================================================
     Links: black + bold, gray on hover
     ========================================================= */

  a,
  .prose a,
  .article-style a,
  .markdown a {
    color: #000000 !important;
    font-weight: 700 !important;
    text-decoration: underline !important;
    text-decoration-thickness: 1px !important;
    text-underline-offset: 3px !important;
    background-image: none !important;
  }

  a:hover,
  .prose a:hover,
  .article-style a:hover,
  .markdown a:hover {
    color: var(--hover) !important;
    text-decoration-color: var(--hover) !important;
    background-image: none !important;
  }

  .gradient-underline,
  .prose a,
  .article-style a {
    background-image: none !important;
  }

  /* =========================================================
     Download CV button
     ========================================================= */

  a[href$="CV_Wenwen_Guo.pdf"],
  a[href*="CV_Wenwen_Guo.pdf"] {
    display: inline-block !important;
    margin-top: 0.4rem !important;
    padding: 0.65rem 1rem !important;
    border: 1px solid var(--border) !important;
    border-radius: 999px !important;
    background: #ffffff !important;
    color: #000000 !important;
    font-weight: 700 !important;
    text-decoration: none !important;
    transition:
      background 0.25s ease,
      color 0.25s ease,
      border-color 0.25s ease,
      transform 0.25s ease !important;
  }

  a[href$="CV_Wenwen_Guo.pdf"]:hover,
  a[href*="CV_Wenwen_Guo.pdf"]:hover {
    background: var(--surface-alt) !important;
    color: var(--hover) !important;
    border-color: #d1d5db !important;
    transform: translateY(-1px);
  }

  /* =========================================================
     Remove old template card look
     ========================================================= */

  .section-card,
  .card,
  .view-card,
  .article-card,
  .project-card,
  .pub-list-item,
  .experience,
  .featurette,
  .resume-biography,
  .resume-experience,
  .wg-about,
  .wg-experience,
  .wg-portfolio,
  .wg-pages,
  .wg-accomplishments {
    background: transparent !important;
    box-shadow: none !important;
  }

  /* =========================================================
     Profile block animation: left to right
     ========================================================= */

  #profile {
    opacity: 0;
    transform: translateX(-48px);
    animation: profileSlideInLeft 0.9s cubic-bezier(.22, .61, .36, 1) forwards;
    animation-delay: 0.12s;
    will-change: opacity, transform;
  }

  @keyframes profileSlideInLeft {
    from {
      opacity: 0;
      transform: translateX(-48px);
    }

    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  /* =========================================================
     Scroll reveal sections
     ========================================================= */

  .markdown-section-reveal {
    opacity: 0;
    transform: translateY(36px);
    transition:
      opacity 0.85s cubic-bezier(.22, .61, .36, 1),
      transform 0.85s cubic-bezier(.22, .61, .36, 1);
    will-change: opacity, transform;
  }

  .markdown-section-reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  .markdown-section-reveal + .markdown-section-reveal {
    margin-top: 2.2rem;
  }

  .markdown-section-reveal h2 {
    margin-top: 0 !important;
  }

  /* =========================================================
     Plain right-side navigation
     ========================================================= */

  #right-section-nav {
    position: fixed !important;
    right: 42px !important;
    top: 50% !important;
    transform: translateY(-50%) !important;
    z-index: 99999 !important;
    width: 190px !important;
    padding: 0 !important;
    border: none !important;
    border-radius: 0 !important;
    background: transparent !important;
    backdrop-filter: none !important;
    box-shadow: none !important;
    display: block !important;
  }

  #right-section-nav .right-nav-title {
    display: none !important;
  }

  #right-section-nav .right-nav-links {
    display: flex !important;
    flex-direction: column !important;
    gap: 0.48rem !important;
  }

  #right-section-nav a {
    display: block !important;
    padding: 0 !important;
    border: none !important;
    border-radius: 0 !important;
    background: transparent !important;
    color: #6b7280 !important;
    text-decoration: none !important;
    font-size: 0.92rem !important;
    font-weight: 400 !important;
    line-height: 1.35 !important;
    transition:
      color 0.2s ease,
      font-weight 0.2s ease !important;
  }

  #right-section-nav a:hover {
    background: transparent !important;
    color: #000000 !important;
    transform: none !important;
  }

  #right-section-nav a.is-active {
    background: transparent !important;
    color: #000000 !important;
    font-weight: 800 !important;
    border: none !important;
  }

  @media (max-width: 1199px) {
    #right-section-nav {
      display: none !important;
    }
  }

  /* =========================================================
     Footer
     ========================================================= */

  footer,
  .site-footer {
    background: #ffffff !important;
    border-top: 1px solid var(--border) !important;
    color: var(--muted) !important;
  }

  /* =========================================================
     Mobile
     ========================================================= */

  @media (max-width: 768px) {
    #profile {
      transform: translateX(-28px);
    }

    @keyframes profileSlideInLeft {
      from {
        opacity: 0;
        transform: translateX(-28px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .markdown-section-reveal {
      transform: translateY(24px);
    }
  }

  /* =========================================================
     Reduced motion
     ========================================================= */

  @media (prefers-reduced-motion: reduce) {
    #profile,
    .markdown-section-reveal {
      opacity: 1 !important;
      transform: none !important;
      animation: none !important;
      transition: none !important;
    }
  }
</style>

<script>
(function () {
  function slugify(text) {
    return text
      .toLowerCase()
      .trim()
      .replace(/[^\w\u4e00-\u9fa5]+/g, "-")
      .replace(/^-+|-+$/g, "");
  }

  function getMainContainer() {
    return (
      document.querySelector(".wg-about .article-style") ||
      document.querySelector(".wg-about .prose") ||
      document.querySelector(".wg-about article") ||
      document.querySelector(".article-style") ||
      document.querySelector(".prose") ||
      document.querySelector("article") ||
      document.querySelector("main")
    );
  }

  function wrapMarkdownSections(container) {
    if (!container) return [];

    const headings = Array.from(container.querySelectorAll("h2")).filter(function (heading) {
      return heading.textContent.trim().length > 0 &&
             !heading.closest("#right-section-nav");
    });

    headings.forEach(function (heading) {
      if (heading.closest(".markdown-section-reveal")) return;

      const wrapper = document.createElement("section");
      wrapper.className = "markdown-section-reveal";

      heading.parentNode.insertBefore(wrapper, heading);
      wrapper.appendChild(heading);

      let next = wrapper.nextSibling;

      while (next) {
        const current = next;
        next = next.nextSibling;

        if (current.nodeType === 1 && current.tagName === "H2") {
          wrapper.parentNode.insertBefore(current, wrapper.nextSibling);
          break;
        }

        wrapper.appendChild(current);
      }
    });

    return Array.from(container.querySelectorAll(".markdown-section-reveal")).filter(function (section) {
      return section.querySelector("h2");
    });
  }

  function revealSections(sections) {
    if (!sections.length) return;

    if (!("IntersectionObserver" in window)) {
      sections.forEach(function (section) {
        section.classList.add("is-visible");
      });
      return;
    }

    const observer = new IntersectionObserver(
      function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            observer.unobserve(entry.target);
          }
        });
      },
      {
        threshold: 0.12,
        rootMargin: "0px 0px -80px 0px"
      }
    );

    sections.forEach(function (section, index) {
      section.style.transitionDelay = Math.min(index * 0.05, 0.25) + "s";
      observer.observe(section);
    });
  }

  function buildRightNav(sections) {
    const oldNav = document.getElementById("right-section-nav");
    if (oldNav) oldNav.remove();

    if (!sections.length) return;

    sections.forEach(function (section, index) {
      const heading = section.querySelector("h2");
      if (!heading) return;

      if (!section.id) {
        section.id = (slugify(heading.textContent) || "section") + "-" + (index + 1);
      }
    });

    const nav = document.createElement("nav");
    nav.id = "right-section-nav";
    nav.setAttribute("aria-label", "Section navigation");

    const title = document.createElement("div");
    title.className = "right-nav-title";
    title.textContent = "On this page";

    const linksBox = document.createElement("div");
    linksBox.className = "right-nav-links";

    sections.forEach(function (section) {
      const heading = section.querySelector("h2");
      if (!heading) return;

      const link = document.createElement("a");
      link.href = "#" + section.id;
      link.textContent = heading.textContent.trim();

      link.addEventListener("click", function (event) {
        event.preventDefault();

        section.scrollIntoView({
          behavior: "smooth",
          block: "start"
        });

        history.replaceState(null, "", "#" + section.id);
        setActive(section.id);
      });

      linksBox.appendChild(link);
    });

    nav.appendChild(title);
    nav.appendChild(linksBox);
    document.body.appendChild(nav);

    const links = Array.from(nav.querySelectorAll("a"));

    function setActive(id) {
      links.forEach(function (link) {
        link.classList.toggle("is-active", link.getAttribute("href") === "#" + id);
      });
    }

    function updateActive() {
      let activeSection = sections[0];

      sections.forEach(function (section) {
        const rect = section.getBoundingClientRect();

        if (rect.top <= 180) {
          activeSection = section;
        }
      });

      if (activeSection) {
        setActive(activeSection.id);
      }
    }

    updateActive();

    window.addEventListener("scroll", updateActive, { passive: true });
    window.addEventListener("resize", updateActive);
  }

  function init() {
    const container = getMainContainer();
    const sections = wrapMarkdownSections(container);

    revealSections(sections);
    buildRightNav(sections);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function () {
      init();
      setTimeout(init, 500);
    });
  } else {
    init();
    setTimeout(init, 500);
  }
})();
</script>
