<style>
  /* ===== Clean white + soft gray theme ===== */

  :root {
    --brand: #9CA3AF;
    --brand-weak: #F4F4F5;
    --surface: #FFFFFF;
    --surface-alt: #F4F4F5;
    --border: #E5E7EB;
    --text: #111827;
    --muted: #6B7280;
    --link: #2563EB;
    --max-width: 1080px;
  }

  html,
  body {
    background: var(--surface) !important;
    color: var(--text) !important;
  }

  body::before {
    display: none !important;
  }

  /* ===== Header / Navigation ===== */

  #site-header.header,
  .navbar,
  .navbar-light,
  header {
    background-color: var(--surface) !important;
    border-bottom: 1px solid var(--border);
    box-shadow: none !important;
  }

  .nav-link,
  .navbar-nav .nav-link {
    color: var(--text) !important;
    font-weight: 500;
  }

  .nav-link:hover,
  .navbar-nav .nav-link:hover,
  .hover\:text-primary-700:hover,
  :is(.dark .nav-link:hover) {
    color: var(--brand) !important;
  }

  /* ===== Page width and base layout ===== */

  main,
  .page-wrapper,
  .universal-wrapper,
  .article-container,
  .docs-article-container,
  .container,
  .max-w-screen-xl,
  .max-w-7xl,
  .mx-auto {
    max-width: var(--max-width) !important;
  }

  .home-section,
  section {
    background: var(--surface) !important;
  }

  /* ===== Text and links ===== */

  h1,
  h2,
  h3 {
    color: var(--text) !important;
    letter-spacing: -0.02em;
  }

  h2 {
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.45rem;
    margin-top: 2.4rem;
    margin-bottom: 1.15rem;
  }

  a {
    color: var(--link);
    text-underline-offset: 3px;
  }

  a:hover {
    color: var(--text) !important;
  }

  .prose a,
  .article-style a {
    color: var(--link);
  }

  .prose a:hover,
  .article-style a:hover {
    color: var(--text) !important;
  }

  .gradient-underline,
  .prose a {
    background-image: linear-gradient(var(--brand), var(--brand));
  }

  .border-s {
    border-color: var(--border) !important;
  }

  .tl-dot::after {
    box-shadow: 0 0 0 0 color-mix(in srgb, var(--brand) 30%, transparent);
  }

  /* ===== Cards / blocks if any old template elements remain ===== */

  .section-card,
  .card,
  .view-card,
  .article-card,
  .project-card,
  .pub-list-item,
  .experience,
  .featurette,
  .resume-biography,
  .resume-experience,
  .wg-about,
  .wg-experience,
  .wg-portfolio,
  .wg-pages,
  .wg-accomplishments {
    background: transparent !important;
    box-shadow: none !important;
  }

  .section-card {
    background: var(--surface-alt) !important;
    border: 1px solid var(--border);
    border-radius: 1rem;
    padding: 1.5rem;
  }

  @media (min-width: 1024px) {
    .section-card {
      padding: 2rem;
    }
  }

  /* ===== Download CV button ===== */

  a[href$="CV_Wenwen_Guo.pdf"],
  a[href*="CV_Wenwen_Guo.pdf"] {
    display: inline-block;
    margin-top: 0.4rem;
    padding: 0.65rem 1rem;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface-alt);
    color: var(--text) !important;
    font-weight: 600;
    text-decoration: none !important;
    transition:
      background 0.25s ease,
      border-color 0.25s ease,
      transform 0.25s ease;
  }

  a[href$="CV_Wenwen_Guo.pdf"]:hover,
  a[href*="CV_Wenwen_Guo.pdf"]:hover {
    background: #FFFFFF;
    border-color: #D1D5DB;
    transform: translateY(-1px);
  }

  /* ===== Profile block animation: left to right ===== */

  #profile {
    opacity: 0;
    transform: translateX(-48px);
    animation: profileSlideInLeft 0.9s cubic-bezier(.22, .61, .36, 1) forwards;
    animation-delay: 0.12s;
    will-change: opacity, transform;
  }

  @keyframes profileSlideInLeft {
    from {
      opacity: 0;
      transform: translateX(-48px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  /* ===== Scroll reveal for Markdown homepage sections ===== */

  .markdown-section-reveal {
    opacity: 0;
    transform: translateY(36px);
    transition:
      opacity 0.85s cubic-bezier(.22, .61, .36, 1),
      transform 0.85s cubic-bezier(.22, .61, .36, 1);
    will-change: opacity, transform;
  }

  .markdown-section-reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  .markdown-section-reveal + .markdown-section-reveal {
    margin-top: 2.2rem;
  }

  .markdown-section-reveal h2 {
    margin-top: 0;
  }

  /* ===== Lists and spacing ===== */

  .article-style li,
  .prose li,
  .markdown li {
    margin-bottom: 0.55rem;
  }

  .article-style p,
  .prose p,
  .markdown p {
    line-height: 1.75;
  }

  /* ===== Footer ===== */

  footer,
  .site-footer {
    background: var(--surface) !important;
    border-top: 1px solid var(--border);
    color: var(--muted);
  }

  /* ===== Mobile adjustments ===== */

  @media (max-width: 768px) {
    #profile {
      transform: translateX(-28px);
    }

    @keyframes profileSlideInLeft {
      from {
        opacity: 0;
        transform: translateX(-28px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .markdown-section-reveal {
      transform: translateY(24px);
    }
  }

  /* ===== Reduced motion ===== */

  @media (prefers-reduced-motion: reduce) {
    #profile,
    .markdown-section-reveal {
      opacity: 1 !important;
      transform: none !important;
      animation: none !important;
      transition: none !important;
    }
  }
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const aboutWidget = document.querySelector(".wg-about");
  const containers = aboutWidget
    ? aboutWidget.querySelectorAll(".article-style, .prose, .markdown, article")
    : document.querySelectorAll(".article-style, .prose, .markdown, article");

  containers.forEach(function (container) {
    const headings = Array.from(container.querySelectorAll("h2"));

    headings.forEach(function (heading) {
      if (heading.closest(".markdown-section-reveal")) return;

      const wrapper = document.createElement("section");
      wrapper.className = "markdown-section-reveal";

      heading.parentNode.insertBefore(wrapper, heading);
      wrapper.appendChild(heading);

      let next = wrapper.nextSibling;

      while (next) {
        const current = next;
        next = next.nextSibling;

        if (current.nodeType === 1 && current.tagName === "H2") {
          wrapper.parentNode.insertBefore(current, wrapper.nextSibling);
          break;
        }

        wrapper.appendChild(current);
      }
    });
  });

  const revealItems = document.querySelectorAll(".markdown-section-reveal");

  if (!("IntersectionObserver" in window)) {
    revealItems.forEach(function (item) {
      item.classList.add("is-visible");
    });
    return;
  }

  const observer = new IntersectionObserver(
    function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
          observer.unobserve(entry.target);
        }
      });
    },
    {
      threshold: 0.15,
      rootMargin: "0px 0px -80px 0px"
    }
  );

  revealItems.forEach(function (item, index) {
    item.style.transitionDelay = Math.min(index * 0.06, 0.3) + "s";
    observer.observe(item);
  });
});
</script>
